services:
  mcgreen_subscription_payment.payment_due_mail:
    class: Drupal\mcgreen_subscription_payment\Mail\PaymentDueMail
    arguments:
      - '@entity_type.manager'
      - '@commerce.mail_handler'
      - '@commerce_order.order_total_summary'

  mcgreen_subscription_payment.payment_due_subscriber:
    class: Drupal\mcgreen_subscription_payment\EventSubscriber\PaymentDueSubscriber
    arguments: ['@mcgreen_subscription_payment.payment_due_mail']
    tags:
      - { name: event_subscriber }
