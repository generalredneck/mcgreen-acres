################################################################################
# GitLab CI for the Varbase Bootstrap Paragraphs module (10.1.x line - Drupal ~11.4).
#
# Two halves:
#   1. The standard Drupal CI validation jobs (composer-lint, cspell, eslint,
#      phpcs, phpstan, stylelint) provided by the drupalci templates. Every
#      validate job gates strictly (allow_failure:false).
#   2. A webship-js BDD browser-test job (Playwright + Cucumber-js) that runs
#      the tests/features/drupal/** suite against a freshly installed Drupal
#      Standard site provisioned by installing Varbase Media and then Varbase
#      Bootstrap Paragraphs (which pulls in the Paragraphs stack and imports the
#      Bootstrap paragraph bundles), granting the Webmaster super-admin every
#      route.
################################################################################

include:
  - project: $_GITLAB_TEMPLATES_REPO
    ref: $_GITLAB_TEMPLATES_REF
    file:
      - "/includes/include.drupalci.main.yml"
      - "/includes/include.drupalci.variables.yml"
      - "/includes/include.drupalci.workflows.yml"

variables:
  # The 10.1.x branch targets Drupal core 11.4 only. Pin the core version and
  # ignore the project's info.yml core_version_requirement when resolving it.
  DRUPAL_CORE: "11.4.0"
  IGNORE_PROJECT_DRUPAL_CORE_VERSION: "1"
  # Make every drupalci validate job blocking (stylelint et al. default to
  # allow_failure:true). Combined with the per-job allow_failure:false overrides
  # below, the whole pipeline gates strictly.
  _ALL_VALIDATE_ALLOW_FAILURE: "0"
  COMPOSER_FLAGS: "--no-strict-lock"
  COMPOSER_MEMORY_LIMIT: "-1"
  # No yarn.lock is relied upon in CI; Yarn 4 defaults to immutable installs and
  # would refuse to create one. Allow lockfile creation in CI for every job.
  YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

# = Validate stage (all blocking) =
# Force EVERY drupalci validate job to gate. _ALL_VALIDATE_ALLOW_FAILURE=0
# flips the template default (stylelint and a few others default to
# allow_failure:true) to blocking; the explicit per-job overrides below make the
# intent unmissable and cover jobs that read their own _*_ALLOW_FAILURE var.
composer-lint:
  allow_failure: false
cspell:
  allow_failure: false
eslint:
  allow_failure: false
phpcs:
  allow_failure: false
phpstan:
  allow_failure: false
stylelint:
  allow_failure: false

# = Reusable before_script fragments (via !reference) =
.fragments:
  web_db: &web_db
    - mkdir -pv $CI_PROJECT_DIR/$_WEB_ROOT/sites/default/files
    - mkdir -pv $CI_PROJECT_DIR/$_WEB_ROOT/sites/simpletest
    - chmod -R 777 $CI_PROJECT_DIR/$_WEB_ROOT/sites/default/files
    - chmod -R 777 $CI_PROJECT_DIR/$_WEB_ROOT/sites/simpletest
    - rm -rf /var/www/html && ln -s $CI_PROJECT_DIR/$_WEB_ROOT /var/www/html
    - chown -R www-data:www-data $CI_PROJECT_DIR
    - service apache2 start
    - export SIMPLETEST_DB=mysql://$MYSQL_USER:$MYSQL_PASSWORD@database/$MYSQL_DATABASE
  node_playwright: &node_playwright
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
    - node --version && npm --version
    - 'test -f .yarnrc.yml || echo "nodeLinker: node-modules" > .yarnrc.yml'
    # Back up cucumber.js - webship-js's postinstall can clobber it under yarn 4.
    - cp cucumber.js .cucumber.js.bak
    - corepack enable
    - yarn install
    - cp .cucumber.js.bak cucumber.js && rm .cucumber.js.bak
    - ./node_modules/.bin/playwright install --with-deps chromium

# = webship-js BDD - Drupal Standard profile + Varbase Bootstrap Paragraphs install =
webship-js-test:
  extends: .testing-job-base
  needs: [composer]
  # Installing Varbase Bootstrap Paragraphs pulls in the Varbase Media stack and
  # the Paragraphs stack, so allow more than the default 30-minute wall-clock.
  timeout: 2h
  # Only the database service is needed. Playwright bundles its own Chromium,
  # so Selenium and chromedriver are not required.
  services:
    - name: $_CONFIG_DOCKERHUB_ROOT/$_TARGET_DB_TYPE-$_TARGET_DB_VERSION:$_TARGET_DB_IMAGE_TAG
      alias: database
  variables:
    LAUNCH_URL: "http://localhost"
    FORCE_COLOR: "1"
  artifacts:
    when: always
    paths:
      - tests/reports/
      - tests/screenshots/
      - tests/videos/
    expire_in: 7 days
  before_script:
    - !reference [.fragments, web_db]
    - git config --global --add safe.directory "$CI_PROJECT_DIR" || true
    # Varbase Media config sets the image toolkit to ImageMagick. Install the
    # ImageMagick CLI + WebP delegate so image derivative generation during the
    # test install does not fatal (GD stays available as a fallback).
    - apt-get update -y > /dev/null || true
    - apt-get install -y --no-install-recommends imagemagick > /dev/null || true
    - apt-get install -y --no-install-recommends webp > /dev/null || true
    # Drupal core 11.4.0 is not yet installable through the drupal.org Composer
    # facade used by CI, so the composer job resolves to the latest available
    # 11.3.x. The static jobs validate the 11.4 target directly; this browser job
    # verifies runtime behavior on the closest installable core. Relax the
    # checked-out module info.yml core_version_requirement for the test site only
    # (this does NOT change the committed ~11.4.0 requirement) so it can enable.
    - |
      for SCAN in "$CI_PROJECT_DIR" "$CI_PROJECT_DIR/$_WEB_ROOT"; do
        find "$SCAN" -name '*.info.yml' -print0 2>/dev/null \
          | xargs -0 -r sed -i -E 's/core_version_requirement:[[:space:]]*~11\.4\.0/core_version_requirement: ^11.3 || ^11.4/'
      done
    # The released Varbase Media (drupal/varbase_media ~10.1.0 from the Composer
    # facade) still declares `configure: varbase_media.settings` in its info.yml
    # but ships no such route on 10.1.x. Building the configure link during
    # install fatals with "Route varbase_media.settings does not exist". Fixed on
    # the varbase_media 10.1.x fork but not yet tagged, so strip the dangling
    # configure key from the checked-out module for the test site only.
    - |
      find "$CI_PROJECT_DIR/$_WEB_ROOT" -name 'varbase_media.info.yml' -print0 2>/dev/null \
        | xargs -0 -r sed -i -E '/^configure:[[:space:]]*varbase_media\.settings[[:space:]]*$/d'
    - cd $CI_PROJECT_DIR
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT site:install standard
        --db-url=$SIMPLETEST_DB --account-name=webmaster --account-pass=dD.123123ddd
        --site-name="Varbase Bootstrap Paragraphs Test" -y
    # Pre-install drimage_improved (a hard Varbase Media dependency) with its own
    # container rebuild BEFORE the Varbase Media stack installs, so its
    # image_style_repository service is fully registered before config event
    # subscribers reference it.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT pm:install image drimage_improved -y
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    # Create the Varbase editorial roles (site_admin, content_admin, editor,
    # seo_admin) that the Varbase Media and Varbase Bootstrap Paragraphs config
    # grants permissions to. On a full Varbase site the profile provides them; on
    # the Standard test profile they must exist first.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT php:eval 'foreach (["site_admin"=>"Site Administrator","content_admin"=>"Content Administrator","editor"=>"Editor","seo_admin"=>"SEO Administrator"] as $id=>$label) { if (!\Drupal\user\Entity\Role::load($id)) { \Drupal\user\Entity\Role::create(["id"=>$id,"label"=>$label])->save(); } }'
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    # Provision Varbase Media first (its hook_install imports media types, entity
    # browsers and views in the correct order). Installing the module directly
    # (rather than a drush recipe) avoids the Recipe runner's checkpoint rollback.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT pm:install varbase_media -y
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    # Pre-install the Paragraphs stack + the field/text modules the Varbase
    # Bootstrap Paragraphs config/optional depends on. The module's info.yml only
    # declares varbase_media; its hook_install (ModuleInstallerFactory::installList)
    # enables the install: list, but pre-enabling here guarantees the config
    # bundles/displays import cleanly on the Standard test profile.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT pm:install
        text options link ckeditor5 block advanced_text_formatter field_group
        maxlength webform viewsreference entity_reference_revisions paragraphs
        paragraphs_library paragraphs_previewer paragraphs_edit -y
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    # Provision Varbase Bootstrap Paragraphs. Its hook_install imports the
    # Bootstrap paragraph bundles, form/view displays and settings, and grants
    # the paragraph permissions to the editorial roles created above. The
    # Webmaster super-admin reaches every route.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT pm:install varbase_bootstrap_paragraphs -y
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    # Create a non-privileged user for the access-matrix scenario.
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT php:eval '$u = \Drupal\user\Entity\User::create(["name" => "normaluser", "pass" => "dD.123123ddd", "mail" => "normaluser@example.test", "status" => 1]); $u->save();' || true
    - $CI_PROJECT_DIR/vendor/bin/drush --root=$CI_PROJECT_DIR/$_WEB_ROOT cache:rebuild
    - !reference [.fragments, node_playwright]
  script:
    # cucumber.js loads only tests/features/drupal/**. Disable webship-js's auto
    # HTML hook and run generate-reports explicitly so HTML + PDF land next to
    # the JSON in tests/reports/.
    - WEBSHIP_REPORT_DISABLE=1 ./node_modules/.bin/cucumber-js --config cucumber.js --tags "not @wip"
    - node ./node_modules/webship-js/bin/generate-reports.js
        --json tests/reports/cucumber_report.json
        --out  tests/reports/cucumber_report.html
        --format all
        --pdf-out tests/reports/cucumber_report.pdf
  allow_failure: false

# Allow the Varbase stack Composer plugins in the CI build (allow-plugins lives
# in varbase_project, not modules).
composer:
  before_script:
    - composer config --no-plugins allow-plugins.symfony/runtime true || true
    - composer config --no-plugins allow-plugins.composer/installers true || true
    - composer config --no-plugins allow-plugins.cweagans/composer-patches true || true
    - composer config --no-plugins allow-plugins.oomphinc/composer-installers-extender true || true
    - composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true || true
    - composer config --no-plugins allow-plugins.drupal/core-project-message true || true
    - composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true || true
    - composer config --no-plugins allow-plugins.phpstan/extension-installer true || true
    - composer config --no-plugins allow-plugins.php-http/discovery true || true
    - composer config --no-plugins allow-plugins.tbachert/spi true || true
    - composer config --no-plugins allow-plugins.vardot/varbase-patches true || true
    - composer require --no-update vardot/varbase-patches:~10.1.0
