services:
  prlp_password_policy.route_subscriber:
    class: Drupal\prlp_password_policy\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
  prlp_password_policy_event_subscriber:
    class: Drupal\prlp_password_policy\EventSubscriber\PrlpPasswordPolicyEventSubscriber
    arguments:
      - '@current_user'
      - '@current_route_match'
      - '@request_stack'
      - '@date.formatter'
      - '@datetime.time'
      - '@password_policy.validator'
    tags:
      - {name: event_subscriber}
  prlp_password_policy.validation_manager:
    class: Drupal\prlp_password_policy\PrlpPasswordPolicyValidationManager
    arguments:
      - '@config.factory'
      - '@current_user'
      - '@entity_type.manager'
      - '@current_route_match'
